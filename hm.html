<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Word Game</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --correct-color: #10b981;
            --wrong-color: #ef4444;
            --key-bg: rgba(255, 255, 255, 0.1);
            --key-hover: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 10px;
            border: 1px solid var(--glass-border);
        }

        canvas {
            display: block;
        }

        .word-display {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            min-height: 50px;
        }

        .letter-box {
            width: 40px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 4px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .letter-box.revealed {
            border-bottom-color: var(--accent-color);
            color: var(--text-main);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter-box.space {
            border-bottom: none;
            width: 20px;
        }

        @keyframes popIn {
            0% { transform: scale(0.5) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            width: 100%;
        }

        .key {
            background: var(--key-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 0;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            outline: none;
        }

        .key:hover:not(:disabled) {
            background: var(--key-hover);
            transform: translateY(-2px);
        }

        .key:active:not(:disabled) {
            transform: translateY(0);
        }

        .key.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--correct-color);
            color: var(--correct-color);
        }

        .key.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--wrong-color);
            color: var(--wrong-color);
            opacity: 0.6;
        }

        .key:disabled {
            cursor: not-allowed;
        }

        .status-message {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            min-height: 36px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .status-message.win { color: var(--correct-color); }
        .status-message.lose { color: var(--wrong-color); }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            display: none; /* Hidden initially */
        }

        .restart-btn {
            background: var(--text-main);
            color: #0f172a;
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .keyboard {
                grid-template-columns: repeat(6, 1fr);
                gap: 6px;
            }
            .key {
                padding: 10px 0;
                font-size: 1rem;
            }
            .letter-box {
                width: 30px;
                font-size: 1.5rem;
            }
            .game-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Mystery Word</h1>
        <div class="subtitle">Guess the hidden phrase before you run out of tries!</div>
        
        <div class="canvas-container">
            <canvas id="hangmanCanvas" width="220" height="260"></canvas>
        </div>
        
        <div class="word-display" id="wordDisplay"></div>
        
        <div class="status-message" id="statusMessage"></div>
        
        <div class="keyboard" id="keyboard"></div>
        
        <div class="controls" id="controls">
            <button class="restart-btn" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <script>
        const secretWord = "by yibo";
        let guessedLetters = [];
        let mistakes = 0;
        const maxMistakes = 6;

        const canvas = document.getElementById('hangmanCanvas');
        const ctx = canvas.getContext('2d');

        function initGame() {
            guessedLetters = [];
            mistakes = 0;
            
            // Reset UI
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.className = 'status-message';
            statusMsg.innerText = "";
            document.getElementById('controls').style.display = "none";
            document.getElementById('keyboard').style.display = "grid";
            
            drawGallows();
            renderWord();
            renderKeyboard();
        }

        function renderWord() {
            const wordDisplay = document.getElementById('wordDisplay');
            wordDisplay.innerHTML = '';
            let isWon = true;

            for (let i = 0; i < secretWord.length; i++) {
                const char = secretWord[i];
                const box = document.createElement('div');
                
                if (char === ' ') {
                    box.className = 'letter-box space';
                } else {
                    box.className = 'letter-box';
                    if (guessedLetters.includes(char)) {
                        box.innerText = char;
                        box.classList.add('revealed');
                    } else {
                        isWon = false;
                    }
                }
                wordDisplay.appendChild(box);
            }

            if (isWon) {
                endGame(true);
            }
        }

        function renderKeyboard() {
            const keyboardDiv = document.getElementById('keyboard');
            keyboardDiv.innerHTML = '';
            
            const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
            
            alphabet.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = letter;
                
                // Set states if already guessed
                if (guessedLetters.includes(letter)) {
                    btn.disabled = true;
                    if (secretWord.includes(letter)) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                    }
                }
                
                btn.onclick = () => handleGuess(letter);
                keyboardDiv.appendChild(btn);
            });
        }

        function handleGuess(letter) {
            if (guessedLetters.includes(letter) || mistakes >= maxMistakes) return;
            
            guessedLetters.push(letter);

            if (!secretWord.includes(letter)) {
                mistakes++;
                drawHangmanPart(mistakes);
            }

            renderWord();
            renderKeyboard();

            if (mistakes >= maxMistakes) {
                endGame(false);
            }
        }

        function endGame(didWin) {
            const statusMsg = document.getElementById('statusMessage');
            const keyboardDiv = document.getElementById('keyboard');
            const controlsDiv = document.getElementById('controls');
            
            // Disable all keys instantly
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => key.disabled = true);

            setTimeout(() => {
                keyboardDiv.style.display = "none";
                controlsDiv.style.display = "flex";
                statusMsg.classList.add('show');
                
                if (didWin) {
                    statusMsg.innerText = "🎉 You guessed it!";
                    statusMsg.classList.add('win');
                } else {
                    statusMsg.innerText = "💀 Game Over!";
                    statusMsg.classList.add('lose');
                    
                    // Reveal the word
                    const boxes = document.querySelectorAll('.letter-box:not(.space)');
                    let index = 0;
                    for (let i = 0; i < secretWord.length; i++) {
                        if (secretWord[i] !== ' ') {
                            if (!guessedLetters.includes(secretWord[i])) {
                                boxes[index].innerText = secretWord[i];
                                boxes[index].style.color = "var(--wrong-color)";
                                boxes[index].style.borderBottomColor = "var(--wrong-color)";
                                boxes[index].classList.add('revealed');
                            }
                            index++;
                        }
                    }
                }
            }, 500); // slight delay for dramatic effect
        }

        // --- Canvas Drawing Logic ---
        function setupCanvasStyles() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 6;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
        }

        function drawGallows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setupCanvasStyles();
            
            // Glow effect for neon look
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(255, 255, 255, 0.3)";

            ctx.beginPath();
            // Base
            ctx.moveTo(30, 240);
            ctx.lineTo(190, 240);
            // Pole
            ctx.moveTo(70, 240);
            ctx.lineTo(70, 30);
            // Top beam
            ctx.moveTo(67, 30);
            ctx.lineTo(150, 30);
            // Rope
            ctx.moveTo(150, 30);
            ctx.lineTo(150, 60);
            
            ctx.stroke();
            
            // Remove shadow for body parts to keep them sharp
            ctx.shadowBlur = 0;
        }

        function drawHangmanPart(partNumber) {
            setupCanvasStyles();
            ctx.strokeStyle = "var(--accent-color)"; // Cyan color for the body
            
            ctx.beginPath();
            switch (partNumber) {
                case 1: // Head
                    ctx.arc(150, 80, 20, 0, Math.PI * 2);
                    break;
                case 2: // Body
                    ctx.moveTo(150, 100);
                    ctx.lineTo(150, 170);
                    break;
                case 3: // Left Arm
                    ctx.moveTo(150, 120);
                    ctx.lineTo(110, 150);
                    break;
                case 4: // Right Arm
                    ctx.moveTo(150, 120);
                    ctx.lineTo(190, 150);
                    break;
                case 5: // Left Leg
                    ctx.moveTo(150, 170);
                    ctx.lineTo(110, 220);
                    break;
                case 6: // Right Leg
                    ctx.moveTo(150, 170);
                    ctx.lineTo(190, 220);
                    // Draw Dead Eyes
                    ctx.moveTo(140, 75);
                    ctx.lineTo(146, 81);
                    ctx.moveTo(146, 75);
                    ctx.lineTo(140, 81);
                    
                    ctx.moveTo(154, 75);
                    ctx.lineTo(160, 81);
                    ctx.moveTo(160, 75);
                    ctx.lineTo(154, 81);
                    break;
            }
            ctx.stroke();
        }

        // Start the game on load
        window.onload = initGame;
    </script>
</body>
</html>
